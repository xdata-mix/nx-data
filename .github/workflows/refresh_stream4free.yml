name: Refresh Stream4Free

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install cloudscraper

      - name: Run Stream4Free scraper
        run: python scripts/refresh_stream4free.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-stream4free.m3u
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: refresh stream4free"
            git pull --rebase origin main || git rebase --abort
            git push
          fi

      - name: Auto-cleanup old workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 10

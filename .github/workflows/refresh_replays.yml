# Workflow: génère data-replay.m3u toutes les 6h depuis l'API France.tv.
name: refresh-replays
on:
  schedule:
    - cron: '15 */6 * * *'   # toutes les 6h à minute 15
  workflow_dispatch:
permissions:
  contents: write
  actions: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run refresh_replays.py
        run: python scripts/refresh_replays.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-replay.m3u
          git diff --staged --quiet || git commit -m "auto: refresh data-replay.m3u"
          git push
      - name: Auto-cleanup old workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 10

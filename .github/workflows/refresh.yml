# GitHub Actions workflow: refresh dead M3U URLs from ParaTV main# Migré depuis Codeberg car ubuntu-latest = runner beaucoup plus fiable.name: refresh-m3u-urlson:  schedule:    - cron: '7,37 * * * *'→ Runs every 30 minutes  workflow_dispatch:permissions:  contents: writejobs:  refresh:    runs-on: ubuntu-latest    timeout-minutes: 10    steps:      - name: Checkout        uses: actions/checkout@v4        with:          fetch-depth: 0      - name: Setup Python        uses: actions/setup-python@v5        with:          python-version: '3.11'      - name: Install deps        run: pip install --no-cache-dir aiohttp      - name: Run refresh        run: python scripts/refresh_urls.py      - name: Commit & push        run: |          if [ -n "$(git status --porcelain data.m3u)" ]; then            git config user.email "actions@github.com"            git config user.name "GitHub Actions"            git add data.m3u            git commit -m "Auto-refresh: dead URLs replaced [skip ci]"            git pull --rebase origin main || (git rebase --abort; exit 1)            git push          else

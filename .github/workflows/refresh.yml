# GitHub Actions workflow: refresh dead M3U URLs from ParaTV main.
# DÃ©clenchement = ping externe (cron-job.org) via API workflow_dispatch,
# tous les 1 h (stable, contrairement au scheduler GitHub natif).
name: refresh-m3u-urls
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install aiohttp
        run: pip install aiohttp
      - name: Run refresh script
        run: python scripts/refresh_urls.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.m3u
          git diff --staged --quiet || git commit -m "auto: refresh m3u URLs"
          git push

name: Refresh FAST Channels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run refresh_fast.py
        run: python scripts/refresh_fast.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.m3u
          git diff --cached --quiet || (git commit -m "auto: refresh FAST channels" && git push)

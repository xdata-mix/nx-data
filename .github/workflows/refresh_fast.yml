name: refresh-fast
on:
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: refresh-fast-only
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run refresh_fast.py
        run: python scripts/refresh_fast.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-fast.m3u
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto: refresh FAST channels"
            git push
          fi
